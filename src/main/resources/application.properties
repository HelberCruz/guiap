# Banco H2 com persistência
spring.datasource.url=jdbc:h2:file:./data/prototipo_db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Recursos estáticos
spring.web.resources.static-locations=classpath:/static/

# Logging para debug
logging.level.com.IFSP.Prototipo=DEBUG
logging.level.org.hibernate.SQL=INFO
# Configurações de upload de arquivos
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Configuração para servir arquivos estáticos
spring.web.resources.static-locations=classpath:/static/,file:uploads/
# API Keys (OBTER EM: https://makersuite.google.com/app/apikey)
gemini.api.key=${GEMINI_API_KEY}
google.maps.key=${GOOGLE_MAPS_KEY}

# Configurações do projeto
spring.application.name=guiap
server.port=8080

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Recursos estáticos
spring.web.resources.static-locations=classpath:/static/