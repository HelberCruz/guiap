<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuGuia - Roteiro Gerado</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Seus estilos -->
    <link rel="stylesheet" th:href="@{/css/roteiro.css}">

    <!-- Leaflet CSS LOCAL -->
    <link rel="stylesheet" th:href="@{/css/leaflet.css}">

    <!-- Estilos adicionais -->
    <style>
        #map {
            width: 100%;
            height: 400px;
            border-radius: 10px;
            overflow: hidden;
        }

        .leaflet-container {
            font-family: inherit;
        }

        .legend-marker {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .legend-rating {
            margin-left: auto;
            color: #f39c12;
            font-weight: bold;
            font-size: 0.9em;
        }
    </style>
</head>
    <!-- Após o header, adicione: -->
<div id="api-status" class="api-status" style="display: none;">
    <i class="fas fa-info-circle"></i>
    <span id="status-message"></span>
</div>
<body th:classappend="${userTheme == 'dark'} ? 'dark-mode'">
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo" onclick="window.location.href='inicial'">
                    <i class="fas fa-map-marked-alt"></i>
                    <span>MeuGuia</span>
                </div>
            </div>
            <!-- Perfil do usuário -->
            <div class="user-profile">
                <div class="avatar-container-sidebar">
                    <img th:if="${usuario.fotoPerfil}" th:src="@{'/uploads/' + ${usuario.fotoPerfil}}"
                        alt="Foto de perfil" class="avatar-image-sidebar">
                    <i th:unless="${usuario.fotoPerfil}" class="fas fa-user-circle"></i>
                </div>
                <div class="user-info">
                    <span class="user-name" id="user-name" th:text="${primeiroNome}">Usuário</span>
                </div>
            </div>
            <nav class="menu">
                <div class="menu-category">
                    <h3>Meus Roteiros</h3>
                    <ul>
                        <li><i class="fas fa-history"></i> Histórico</li>
                        <li><i class="fas fa-heart"></i> Favoritos</li>
                        <li onclick="window.location.href='inicial'"><i class="fas fa-plus-circle"></i> Criar Novo</li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- Conteúdo Principal -->
        <main class="main-content">
            <!-- Botão Voltar -->
            <button class="btn-back" onclick="window.location.href='inicial'">
                <i class="fas fa-arrow-left"></i> Voltar para Início
            </button>

            <header class="content-header">
                <div class="header-left">
                    <h1 id="page-title">Roteiro do Guia</h1>
                </div>
                <div class="header-right">
                    <div class="header-actions">
                        <button class="btn-share">
                            <i class="fas fa-share-alt"></i> Compartilhar
                        </button>
                        <button class="btn-favorite-header">
                            <i class="fas fa-star"></i> Favoritar
                        </button>
                    </div>
                </div>
            </header>

            <div class="location-info">
                <h2>Localização do Roteiro</h2>
                <div class="current-location">
                    <div class="location-icon">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div class="location-details">
                        <h3 id="current-location-name">Carregando...</h3>
                        <p id="current-location-description">Explore os pontos selecionados</p>
                    </div>
                </div>
            </div>

            <div id="locations-grid" class="locations-grid">
                <!-- Os cards de localização serão inseridos aqui dinamicamente -->
            </div>

            <div class="action-footer">
                <button class="btn-confirm-small" id="confirm-roteiro-btn">
                    <i class="fas fa-check-circle"></i> Confirmar Roteiro
                </button>
                <div class="route-info">
                    <span><i class="fas fa-route"></i> Distância total: <span id="total-distance">0km</span></span>
                    <span><i class="fas fa-clock"></i> Tempo estimado: <span id="total-time">0min</span></span>
                </div>
            </div>
        </main>

        <!-- Mapa Lateral -->
        <div class="map-sidebar">
            <div class="map-container">
                <div id="map" class="map-placeholder">
                    <i class="fas fa-map-marked-alt"></i>
                    <p>Mapa do Roteiro</p>
                    <small>Visualize os locais no mapa</small>
                </div>
            </div>
            <div id="map-legend" class="map-legend">
                <h4>Pontos do Roteiro</h4>
                <ul id="legend-list">
                    <!-- Os itens da legenda serão inseridos aqui dinamicamente -->
                </ul>
            </div>
        </div>
    </div>
    <!-- Scripts no FINAL do body, NA ORDEM CORRETA -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script th:src="@{/js/shared/translations.js}"></script>
    <script th:src="@{/js/shared/languageManager.js}"></script>
    <script th:src="@{/js/shared/utils.js}"></script>
    <script th:src="@{/js/roteiro/geminiService.js}"></script>
    <script th:src="@{/js/roteiro/mapsService.js}"></script>
    <script th:src="@{/js/roteiro/itineraryService.js}"></script>
    <script th:src="@{/js/roteiro/main.js}"></script>
</body>

</html>
