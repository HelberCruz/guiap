<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MeuGuia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <div class="desktop-container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-map-marked-alt"></i>
                <span>MeuGuia</span>
            </div>
            <p>Faça login para acessar sua conta</p>
        </header>
        
        <div class="form-container">
            <!-- Mensagens de alerta -->
            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}">Email ou senha incorretos</span>
            </div>
            
            <div th:if="${success}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}">Cadastro realizado com sucesso!</span>
            </div>
            
            <div th:if="${info}" class="alert alert-info">
                <i class="fas fa-info-circle"></i>
                <span th:text="${info}">Você foi desconectado com sucesso.</span>
            </div>
            
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">E-mail</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-control" id="username" name="username" 
                               placeholder="Digite seu e-mail" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Digite sua senha" required>
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i>
                    Fazer Login
                </button>
                
                <div class="divider">
                    <span>ou</span>
                </div>
                
                <a th:href="@{/cadastro}" class="btn-secondary">Cadastrar</a>
            </form>
        </div>
        
        <footer class="footer">
            <p>&copy; 2025 MeuGuia - Todos os direitos reservados</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            
            if (togglePassword && passwordInput) {
                togglePassword.addEventListener('click', function() {
                    // Alterna entre type password e text
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    
                    // Alterna o ícone
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                });
            }
        });
    </script>
</body>
</html>
